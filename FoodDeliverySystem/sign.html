<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delish Bites - Authentication</title>
    <!-- Modern Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="sign.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="glass-panel">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-utensils"></i> Delish Bites
                </div>
                <!-- Toggle between Login and Signup -->
                <div class="auth-toggle">
                    <button id="btn-login" class="active">Login</button>
                    <button id="btn-signup">Sign Up</button>
                </div>
            </div>

            <div class="form-container">
                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <h2>Welcome Back</h2>
                    <p class="form-subtitle">Enter your credentials to access your account</p>

                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <div class="input-with-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="login-email" name="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn primary-gradient">Login</button>
                </form>

                <!-- Signup Form -->
                <form id="signup-form" class="auth-form hidden">
                    <h2>Create Account</h2>
                    <p class="form-subtitle">Join us to order delicious meals</p>

                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <div class="input-with-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-with-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="Create a password" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="role">Register As</label>
                        <div class="input-with-icon">
                            <i class="fas fa-user-shield"></i>
                            <select id="role" name="role" required>
                                <option value="USER">Normal User</option>
                                <option value="ADMIN">Administrator</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn primary-gradient">Sign Up</button>
                </form>
            </div>
        </div>
    </div>

    <script src="sign.js"></script>
</body>
</html>
